<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico">
  <meta name="generator" content="pandoc">
  <meta name="author" content="image">
  <title id="lesson-title">Cargando lección...</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">

  <!-- Resource hints optimizados para CDNs y recursos críticos -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.geogebra.org" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

  <!-- Preload de CSS crítico de Reveal.js -->
  <link rel="preload" href="reveal/dist/reset.css" as="style">
  <link rel="preload" href="reveal/dist/reveal.css" as="style">
  <link rel="preload" href="reveal/dist/theme/white.css" as="style">
  <link rel="preload" href="styles/style.css" as="style">

  <!-- CSS crítico inline optimizado -->
  <style>
    /* Optimized loading and error states */
    .loading-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 1.2em;
      color: #666;
      background: linear-gradient(-45deg, #f7fafc, #e2e8f0);
      will-change: opacity;
      text-align: center;
    }

    .loading-message>div {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .error-message {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #d32f2f;
      text-align: center;
      background: #fafafa;
    }

    .error-message h2 {
      margin-bottom: 1rem;
    }

    .error-message p {
      color: #666;
      max-width: 600px;
    }

    /* Reveal.js optimizations */
    .reveal {
      will-change: transform;
    }

    .reveal .sourceCode {
      overflow: visible;
    }

    code {
      white-space: pre-wrap;
    }

    span.smallcaps {
      font-variant: small-caps;
    }

    div.columns {
      display: flex;
      gap: min(4vw, 1.5em);
    }

    div.column {
      flex: auto;
      overflow-x: auto;
    }

    div.hanging-indent {
      margin-left: 1.5em;
      text-indent: -1.5em;
    }

    ul.task-list[class] {
      list-style: none;
    }

    ul.task-list li input[type="checkbox"] {
      font-size: inherit;
      width: 0.8em;
      margin: 0 0.8em 0.2em -1.6em;
      vertical-align: middle;
    }
  </style>

  <!-- CSS crítico de Reveal.js -->
  <link rel="stylesheet" href="reveal/dist/reset.css">
  <link rel="stylesheet" href="reveal/dist/reveal.css">
  <link rel="stylesheet" href="reveal/dist/theme/white.css" id="theme">
  <link rel="stylesheet" href="styles/style.css" />

  <!-- CSS no crítico con preload -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style"
    crossorigin onload="this.onload=null;this.rel='stylesheet'">

  <!-- Preload de scripts críticos -->
  <link rel="preload" href="https://www.geogebra.org/apps/deployggb.js" as="script" crossorigin>
  <link rel="preload" href="scripts/mathjax-config.js" as="script">
  <link rel="preload" href="reveal/dist/reveal.js" as="script">
  <link rel="preload" href="scripts/lesson-shell.js" as="script">
  <link rel="preload" href="scripts/lesson-reveal-init.js" as="script">

  <!-- GeoGebra con defer para mejor performance -->
  <script src="https://www.geogebra.org/apps/deployggb.js" defer crossorigin></script>

  <!-- MathJax con async optimizado -->
  <script src="scripts/mathjax-config.js" async></script>

  <!-- Fallback para CSS en caso de que JavaScript esté deshabilitado -->
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/landing.css">
  </noscript>
</head>

<body>
  <div class="loading-message" id="loading-message">
    <div>
      <div style="font-size: 1.5em; margin-bottom: 0.5rem;"><i class="fas fa-spinner fa-spin"></i></div>
      <div>Cargando clase...</div>
      <div style="font-size: 0.9em; color: #888; margin-top: 0.5rem;">
        Preparando contenidos matemáticos y elementos interactivos
      </div>
    </div>
  </div>

  <div class="reveal" id="reveal-container" style="display: none;">
    <div class="slides" id="lesson-slides">
      <!-- Content will be loaded dynamically -->
    </div>
  </div>

  <div class="error-message" id="error-message" style="display: none;">
    <h2>Error al cargar la clase</h2>
    <p>No se pudo cargar el contenido de la clase. Verifica que los parámetros de la URL sean correctos.</p>
  </div>

  <!-- Reveal.js core con defer optimizado -->
  <script src="reveal/dist/reveal.js" defer></script>

  <!-- Reveal.js plugins con defer -->
  <script src="reveal/plugin/notes/notes.js" defer></script>
  <script src="reveal/plugin/search/search.js" defer></script>
  <script src="reveal/plugin/zoom/zoom.js" defer></script>

  <!-- Scripts de lección optimizados -->
  <script src="scripts/lesson-shell.js" defer></script>
  <script src="scripts/lesson-reveal-init.js" defer></script>

  <!-- Dynamic GeoGebra scripts will be injected here -->
  <div id="dynamic-scripts"></div>

  <script>
    // Initialize lesson when DOM is ready
    document.addEventListener('DOMContentLoaded', function () {
      parseParams();
      loadLessonContent();
    });

    // Global error handler
    function showError(message) {
      console.error('Lesson error:', message);
      document.getElementById('loading-message').style.display = 'none';
      document.getElementById('reveal-container').style.display = 'none';
      document.getElementById('error-message').style.display = 'block';
    }
  </script>

</body>

</html>
