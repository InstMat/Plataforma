<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Carreras</title>
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Archivo CSS externo -->
    <link rel="stylesheet" href="styles/landing.css">
</head>
<body>
    <div class="container">
        <!-- Encabezado -->
        <header>
            Plataforma de módulos matemáticos
        </header>

        <!-- Contenido principal -->
        <div class="main-content">
            <!-- Menú lateral -->
            <div class="sidebar">
                <h2>Carrera</h2>
                <ul id="lista-carreras"></ul> <!-- Contenedor para las carreras -->
                <!-- Botón de volver al inicio -->
                <a href="#" class="home-button" onclick="recargarCarreras()">
                    <i class="fas fa-home"></i> Volver al inicio
                </a>
            </div>

            <!-- Área de contenido -->
            <div class="content">
                <h2 class="section-title">Lista de módulos disponibles</h2>
                <ul id="lista-cursos" class="course-list"></ul>
                <!-- Spinner de carga -->
                <div id="loading-spinner" class="spinner" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts/carreras.js"></script>
</body>
</html>
