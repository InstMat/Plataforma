<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Carreras</title>
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Archivo CSS externo -->
    <link rel="stylesheet" href="styles/landing.css">
</head>
<body>
    <div class="container">
        <!-- Encabezado -->
        <header>
            Plataforma de módulos matemáticos
        </header>

        <!-- Contenido principal -->
        <div class="main-content">
            <!-- Menú lateral -->
            <div class="sidebar">
                <h2>Carrera</h2>
                <ul>
                    <li>
                        <a href="#" onclick="verCursos('cpa')">
                            Contador público y auditor
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="verCursos('aud')">
                            Auditoría y control de gestión
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="verCursos('ivideo')">
                            Ingeniería en Desarrollo de Videojuegos y Realidad Virtual
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="verCursos('ibio')">
                            Ingeniería Civil en Bioinformática
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Área de contenido -->
            <div class="content">
                <h2 class="section-title">Lista de módulos disponibles</h2>
                <ul id="lista-cursos" class="course-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const carreras = {
            cpa: [
                { nombre: "Matemáticas (Anual)", enlace: "Matematicas-AUD-CPA_FEN/index.html" },
            ],
            aud: [
                { nombre: "Matemáticas (Anual)", enlace: "Matematicas-AUD-CPA_FEN/index.html" },
            ],
            ivideo: [
                { nombre: "Ecuaciones Diferenciales Ordinarias", enlace: "EDO_IngCiv/index.html" },
            ],
            ibio: [
                { nombre: "Ecuaciones Diferenciales Ordinarias", enlace: "EDO_IngCiv/index.html" },
            ]
        };

        function verCursos(carrera) {
            const lista = document.getElementById("lista-cursos");
            lista.innerHTML = "";
            carreras[carrera].forEach(curso => {
                const li = document.createElement("li");
                const a = document.createElement("a");
                a.textContent = curso.nombre;
                a.href = curso.enlace;
                a.classList.add("course-link");
                li.appendChild(a);
                lista.appendChild(li);
            });
        }
    </script>
</body>
</html>
