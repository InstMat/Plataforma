<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GeoGebra Interactivo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/theme/white.css">
  <style>
    .botonera {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 1em;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .botonera button {
      padding: 10px;
      font-size: 1em;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #ccc;
      background-color: #f0f0f0;
      transition: background-color 0.2s;
    }

    .botonera button:hover {
      background-color: #dceeff;
    }

    .formula {
      text-align: center;
      font-size: 1.5em;
      margin-bottom: 0.5em;
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-left: 20px;
      position: absolute;
      right: 10px;
      top: 50px;
      width: 200px;
    }

    .slider-label {
      font-size: 1em;
    }

    .slider {
      width: 80%;
      height: 8px;  /* Reducir el tamaño de los sliders */
      margin-bottom: 10px;
    }

    .slider-value {
      font-size: 1.1em;
    }

    #sliders {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      margin-top: 20px;
    }

  </style>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>

  <div class="reveal">
    <div class="slides">

      <!-- Slide 1: Grilla de funciones -->
      <section>
        <h2>Elige una función para graficar</h2>

        <div class="botonera">
          <button onclick="graficarFuncion('x^2', 'x^2')">x²</button>
          <button onclick="graficarFuncion('sin(x)', '\\sin(x)')">sin(x)</button>
          <button onclick="graficarFuncion('cos(x)', '\\cos(x)')">cos(x)</button>
          <button onclick="graficarFuncion('ln(x)', '\\ln(x)')">ln(x)</button>
          <button onclick="graficarFuncion('exp(x)', 'e^x')">eˣ</button>
          <button onclick="graficarFuncion('1/x', '\\frac{1}{x}')">1/x</button>
        </div>

        <div id="formula" class="formula">Selecciona una función</div>
        <div id="ggb-element" style="width: 600px; height: 400px; margin: auto;"></div>
      </section>

      <!-- Slide 2: Sliders para f(x) = mx + b -->
      <section>
        <h2>Explora la función \( f(x) = mx + b \)</h2>
        <div id="ggb-lineal" style="width: 600px; height: 400px; margin: auto;"></div>
      </section>

      <!-- Slide 3: Sliders para f(x) = ax² + bx + c -->
      <section>
        <h2>Explora la función cuadrática \( f(x) = ax^2 + bx + c \)</h2>

        <!-- Contenedor de sliders fuera del applet, ajustado a la derecha -->
        <div class="slider-container">
          <div class="slider-label">Coeficiente a:</div>
          <input type="range" id="slider-a" class="slider" min="-5" max="5" step="0.1" value="1" />
          <div id="slider-a-value" class="slider-value">1</div>

          <div class="slider-label">Coeficiente b:</div>
          <input type="range" id="slider-b" class="slider" min="-5" max="5" step="0.1" value="0" />
          <div id="slider-b-value" class="slider-value">0</div>

          <div class="slider-label">Coeficiente c:</div>
          <input type="range" id="slider-c" class="slider" min="-5" max="5" step="0.1" value="0" />
          <div id="slider-c-value" class="slider-value">0</div>
        </div>

        <!-- El área del applet de GeoGebra -->
        <div id="ggb-cuadratica" style="width: 600px; height: 400px; margin: auto;"></div>
      </section>

    </div>
  </div>

  <!-- Reveal.js -->
  <script src="https://unpkg.com/reveal.js/dist/reveal.js"></script>
  <script>
    Reveal.initialize();
  </script>

  <!-- GeoGebra API -->
  <script src="https://cdn.geogebra.org/apps/deployggb.js"></script>

  <!-- Slide 1: funciones con botones -->
  <script>
    var applet1 = new GGBApplet({
      id: "ggb-applet",
      appName: "classic",
      width: 600,
      height: 400,
      showToolbar: false,
      showMenuBar: false,
      showAlgebraInput: false,
      showResetIcon: false,
      showZoomButtons: true,
      enableShiftDragZoom: true,
      perspective: "G"
    }, true);

    window.addEventListener("load", function () {
      applet1.inject("ggb-element");
    });

    function graficarFuncion(expr, tex) {
      const ggb = document.ggbApplet;
      try { ggb.evalCommand("Delete[f]"); } catch (e) {}
      try {
        ggb.evalCommand(`f(x) = ${expr}`);
        ggb.setLabelVisible("f", false);
      } catch (e) {
        alert("Error al graficar la función.");
      }

      const formulaDiv = document.getElementById("formula");
      formulaDiv.innerHTML = `$$f(x) = ${tex}$$`;
      if (window.MathJax && MathJax.typeset) {
        MathJax.typeset([formulaDiv]);
      }
    }
  </script>

  <!-- Slide 2: sliders para m y b -->
  <script>
    let ggbApp2 = null;

    Reveal.on('slidechanged', function(event) {
      if (event.indexh === 1 && !ggbApp2) {
        ggbApp2 = new GGBApplet({
          appName: "classic",
          width: 600,
          height: 400,
          showToolbar: false,
          showMenuBar: false,
          showAlgebraInput: false,
          showResetIcon: false,
          showZoomButtons: true,
          enableShiftDragZoom: true,
          perspective: "G"
        }, true);

        ggbApp2.inject("ggb-lineal");

        setTimeout(() => {
          const ggb = ggbApp2.getAppletObject();
          ggb.evalCommand("m = Slider[-5, 5, 0.1, 1]");
          ggb.evalCommand("b = Slider[-5, 5, 0.1, 0]");
          ggb.evalCommand("f(x) = m * x + b");
          ggb.setLabelVisible("f", false);
          ggb.setColor("f", 0, 0, 255);
          ggb.setLineThickness("f", 4);
        }, 500);
      }
    });
  </script>

  <!-- Slide 3: sliders para a, b, c fuera del applet -->
  <script>
    let ggbApp3 = null;

    Reveal.on('slidechanged', function(event) {
      if (event.indexh === 2 && !ggbApp3) {
        ggbApp3 = new GGBApplet({
          appName: "classic",
          width: 600,
          height: 400,
          showToolbar: false,
          showMenuBar: false,
          showAlgebraInput: false,
          showResetIcon: false,
          showZoomButtons: true,
          enableShiftDragZoom: true,
          perspective: "G"
        }, true);

        ggbApp3.inject("ggb-cuadratica");

        setTimeout(() => {
          const ggb = ggbApp3.getAppletObject();
          ggb.evalCommand("a = 1");
          ggb.evalCommand("b = 0");
          ggb.evalCommand("c = 0");
          ggb.evalCommand("f(x) = a * x^2 + b * x + c");
          ggb.setLabelVisible("f", false);
          ggb.setColor("f", 0, 255, 0);
          ggb.setLineThickness("f", 4);
        }, 500);

        // Actualizar la gráfica cuando los sliders cambien
        document.getElementById("slider-a").addEventListener("input", function() {
          const a = parseFloat(this.value);
          document.getElementById("slider-a-value").innerText = a.toFixed(1);
          ggbApp3.getAppletObject().evalCommand(`a = ${a}`);
        });

        document.getElementById("slider-b").addEventListener("input", function() {
          const b = parseFloat(this.value);
          document.getElementById("slider-b-value").innerText = b.toFixed(1);
          ggbApp3.getAppletObject().evalCommand(`b = ${b}`);
        });

        document.getElementById("slider-c").addEventListener("input", function() {
          const c = parseFloat(this.value);
          document.getElementById("slider-c-value").innerText = c.toFixed(1);
          ggbApp3.getAppletObject().evalCommand(`c = ${c}`);
        });
      }
    });
  </script>

</body>
</html>
